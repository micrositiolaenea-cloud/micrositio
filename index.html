<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Comentarios</title>

<style>
*{
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

.contenedor{
    max-width:800px;
    margin:auto;
}

h1{
    text-align:center;
    color:#333;
}

.caja{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

textarea{
    width:100%;
    height:120px;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
    resize:none;
    font-size:16px;
}

button{
    margin-top:10px;
    background:#0d6efd;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0b5ed7;
}

.mensaje{
    margin-top:10px;
    padding:10px;
    border-radius:5px;
    display:none;
}

.error{
    background:#ffe5e5;
    color:#b00020;
}

.exito{
    background:#e6ffea;
    color:#0f7b2d;
}

.comentario{
    background:white;
    margin-top:12px;
    padding:15px;
    border-radius:10px;
    box-shadow:0 1px 4px rgba(0,0,0,.1);
    word-wrap:break-word;
}
</style>
</head>

<body>

<div class="contenedor">

    <h1>Comentarios</h1>

    <div class="caja">

        <textarea
        id="comentario"
        placeholder="Escribe tu comentario aquí..."></textarea>

        <button onclick="publicar()">
            Publicar
        </button>

        <div id="mensaje" class="mensaje"></div>

    </div>

    <div id="comentarios"></div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    query,
    orderBy,
    onSnapshot,
    serverTimestamp
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB49bAQ2B9DEWJOlshh9su-pqoEZTR91gQ",
  authDomain: "la-enea-1735b.firebaseapp.com",
  projectId: "la-enea-1735b",
  storageBucket: "la-enea-1735b.firebasestorage.app",
  messagingSenderId: "100870278827",
  appId: "1:100870278827:web:14bf24bf2606d1458331ee",
  measurementId: "G-NTQNLHYD7E"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const palabrasProhibidas = [
    "idiota",
    "idiotas",
    "imbecil",
    "imbeciles",
    "guevon",
    "guevones",
    "hijueputa",
    "hijueputas",
    "malparido",
    "malparidos",
    "huevon",
    "huevones",
    "carechimba",
    "carechimbas",
    "gonorrea",
    "gonorreas",
    "estupidos",
    "puta",
    "putas",
    "estupido"
];

function mostrarMensaje(texto,tipo){

    const mensaje =
    document.getElementById("mensaje");

    mensaje.textContent = texto;

    mensaje.className =
    "mensaje " + tipo;

    mensaje.style.display = "block";

    setTimeout(()=>{
        mensaje.style.display="none";
    },5000);
}

window.publicar = async function(){

    const texto =
    document.getElementById("comentario")
    .value
    .trim();

    if(!texto){

        mostrarMensaje(
            "Por favor escribe un comentario.",
            "error"
        );

        return;
    }

    const textoMinusculas =
    texto.toLowerCase();

    const contienePalabraProhibida =
    palabrasProhibidas.some(
        palabra =>
        textoMinusculas.includes(palabra)
    );

    if(contienePalabraProhibida){

        mostrarMensaje(
            "Tu comentario no pudo ser publicado porque contiene lenguaje inapropiado. Por favor utiliza un lenguaje respetuoso.",
            "error"
        );

        return;
    }

    await addDoc(
        collection(db,"comentarios"),
        {
            texto,
            fecha: serverTimestamp()
        }
    );

    document.getElementById("comentario")
    .value="";

    mostrarMensaje(
        "Comentario publicado correctamente.",
        "exito"
    );
};

const q = query(
    collection(db,"comentarios"),
    orderBy("fecha","desc")
);

onSnapshot(q,(snapshot)=>{

    const contenedor =
    document.getElementById("comentarios");

    contenedor.innerHTML="";

    snapshot.forEach((doc)=>{

        const dato = doc.data();

        contenedor.innerHTML += `
        <div class="comentario">
            ${dato.texto}
        </div>
        `;
    });

});

</script>

</body>
</html>
